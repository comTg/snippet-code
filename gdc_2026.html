            <div id="formContainer"></div>
            <button id="manualCloseBtn"
                style="display: none; background-color: #2ea44f; color: white; border: none; padding: 12px 32px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 20px; transition: all 0.2s;">Enter

<script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
<script>
    (function () {
        // --- CONSTANTS ---
        var LEAD_KEY = 'gdc_lead_unlocked';

        // --- DOM ELEMENTS ---
        var els = {
            wrapper: document.getElementById('gdc-block-wrapper'),
            overlay: document.getElementById('gateOverlay'),
            iframe: document.getElementById('iframeOut'),
            unlockBtn: document.getElementById('unlockBtn'),
            formContainer: document.getElementById('formContainer'),
            gateCard: document.getElementById('gateCard'),
            manualCloseBtn: document.getElementById('manualCloseBtn')
        };

        // --- STATE PATTERN IMPLEMENTATION ---

        // Abstract State Class
        function State(context) {
            this.context = context;
        }
        State.prototype.enter = function () { };
        State.prototype.exit = function () { };
        State.prototype.handleUnlock = function () { };
        State.prototype.handleClose = function () { };

        // Concrete State: Initial (Empty)
        function InitialState(context) {
            State.call(this, context);
        }
        InitialState.prototype = Object.create(State.prototype);
        InitialState.prototype.enter = function() {
            // Ensure clean slate
            els.overlay.style.display = 'none';
            els.iframe.style.display = 'none';
            els.wrapper.classList.remove('gdc-unlocked');
            document.documentElement.classList.remove('gdc-unlocked-html');
        };

        // Concrete State: Locked
        function LockedState(context) {
            State.call(this, context);
        }
        LockedState.prototype = Object.create(State.prototype);
        LockedState.prototype.enter = function () {
            // Reset UI to locked
            els.wrapper.classList.remove('gdc-unlocked');
            document.documentElement.classList.remove('gdc-unlocked-html');
            els.overlay.style.display = 'flex';
            els.overlay.style.opacity = '1';
            els.overlay.style.visibility = 'visible';
            els.iframe.style.display = 'block';
        };
        LockedState.prototype.handleUnlock = function () {
            // Determine next state based on viewport
            if (window.innerWidth <= 640) {
                this.context.transitionTo(new MobileOverlayState(this.context));
            } else {
                // Desktop: Stay in Locked state visually but show form
                // In a fuller implementation, this could be a 'FormFillingState'
                this.context.loadForm();
            }
        };

        // Concrete State: Mobile Overlay (Focus Mode)
        function MobileOverlayState(context) {
            State.call(this, context);
        }
        MobileOverlayState.prototype = Object.create(State.prototype);
        MobileOverlayState.prototype.enter = function () {
            document.body.classList.add('gdc-mobile-overlay-mode');
            var introText = els.gateCard.querySelector('p');
            if (introText) introText.style.display = 'none';
            this.context.loadForm();
        };
        MobileOverlayState.prototype.exit = function () {
            document.body.classList.remove('gdc-mobile-overlay-mode');
        };
        MobileOverlayState.prototype.handleClose = function () {
            // When closing from mobile overlay (after success), go to Unlocked
            this.context.transitionTo(new UnlockedState(this.context));
        };

        // Concrete State: Unlocked
        function UnlockedState(context) {
            State.call(this, context);
        }
        UnlockedState.prototype = Object.create(State.prototype);
        UnlockedState.prototype.enter = function (isInit) {
            els.wrapper.classList.add('gdc-unlocked');
            document.documentElement.classList.add('gdc-unlocked-html');
            els.iframe.style.display = 'block';

            // Scroll to top when unlocking (not on initial load)
            if (!isInit) {
                window.scrollTo({ top: 0 });
            }

            if (isInit) {
                els.overlay.style.display = 'none';
            } else {
                els.overlay.style.opacity = '0';
                els.overlay.style.visibility = 'hidden';
                setTimeout(function () {
                    els.overlay.style.display = 'none';
                }, 500);
            }
        };

        // Context (State Machine)
        var AppContext = {
            currentState: null,

            init: function () {
                // Start in Initial state (Clean Slate)
                this.transitionTo(new InitialState(this));

                // Then Determine Logic
                var isUnlocked = localStorage.getItem(LEAD_KEY) === 'true';
                if (isUnlocked) {
                    this.transitionTo(new UnlockedState(this), true);
                } else {
                    this.transitionTo(new LockedState(this));
                }
                this.bindEvents();
            },

            transitionTo: function (newState, params) {
                if (this.currentState) {
                    this.currentState.exit();
                }
                this.currentState = newState;
                this.currentState.enter(params);
            },

            bindEvents: function () {
                var self = this;
                els.unlockBtn.addEventListener('click', function () {
                    if (self.currentState && self.currentState.handleUnlock) {
                        self.currentState.handleUnlock();
                    }
                });
                els.manualCloseBtn.addEventListener('click', function () {
                    // Manual close typically leads to Unlocked state
                    // If in MobileOverlay, it transitions to Unlocked
                    // If in Desktop (Locked showing form), it transitions to Unlocked
                    self.transitionTo(new UnlockedState(self));
                });
            },

            loadForm: function () {
                // UI Loading State
                els.unlockBtn.innerText = 'Loading...';
                els.unlockBtn.style.opacity = '0.7';
                els.unlockBtn.style.cursor = 'wait';

                // Load HubSpot Form
                if (typeof hbspt !== 'undefined') {
                    hbspt.forms.create({
                        portalId: "44361574",
                        formId: "08b780cb-4898-467f-9314-ca19e75cf03e",
                        target: "#formContainer",
                        onFormReady: function ($form) {
                            els.unlockBtn.style.display = 'none';
                            var intro = els.gateCard.querySelector('p');
                            if (intro) intro.style.display = 'none';
                            els.formContainer.style.display = 'block';
                        },
                        onFormSubmit: function ($form) {
                            DataCollector.collect($form);
                        },
                        onFormSubmitted: function () {
                            // Success!
                            localStorage.setItem(LEAD_KEY, 'true');
                            els.manualCloseBtn.style.display = 'block';
                        }
                    });
                } else {
                    console.error("HubSpot script not loaded");
                }
            }
        };

        // --- DATA COLLECTION SERVICE ---
        var DataCollector = {
            collect: async function ($form) {
                var getVal = function (name) {
                    var input;
                    if ($form.querySelector) {
                        input = $form.querySelector("input[name='" + name + "']");
                    } else if ($form.find) {
                        input = $form.find("input[name='" + name + "']")[0];
                    }
                    return input ? input.value : "";
                };

                var firstName = getVal("firstname");
                var lastName = getVal("lastname");
                var company = getVal("0-2/name");

                if (!company && $form.querySelector) {
                    var specialInput = $form.querySelector("input[name='0-2/name']");
                    company = specialInput ? specialInput.value : "";
                }

                var formData = {
                    user_name: (firstName + " " + lastName).trim(),
                    company_name: company,
                    user_phone: getVal("phone"),
                    wechat: "",
                    industry: "",
                    user_email: getVal("email"),
                    message: "GDC 2026 List Unlock",
                    SQF_CHANNEL: "2026-gdc",
                    distribution_channel: 'gdc'
                };

                // var serverUrl = "https://sit-1.sharecreators.cn/api/marketing/activity/trialInfoCollect";
                var serverUrl = "https://product.blueberry-ai.com/api/marketing/activity/trialInfoCollect";

                try {
                    await fetch(serverUrl, {
                        method: "POST",
                        headers: {
                            "Accept": "application/json",
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(formData)
                    });
                } catch (err) {
                    console.error("Data collection error:", err);
                }
            }
        };

        // --- INITIALIZE ---
        AppContext.init();
    })();
</script>
